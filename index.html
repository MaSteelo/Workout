<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--bg2:#171717;--bg3:#262626;--bg4:#404040;
  --border:#262626;--border2:#404040;
  --text:#f5f5f5;--text2:#a3a3a3;--text3:#525252;
  --lime:#a3e635;--lime2:#bef264;--lime-dim:rgba(163,230,53,.1);--lime-bd:rgba(163,230,53,.4);
  --amber:#fbbf24;--amber2:#fcd34d;--amber-dim:rgba(251,191,36,.1);--amber-bd:rgba(251,191,36,.4);
  --rose:#fb7185;--rose-dim:rgba(251,113,133,.15);--rose-bd:rgba(251,113,133,.3);
  --emerald:#6ee7b7;--pink:#f472b6;
  --mono:'Courier New',Courier,monospace;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Helvetica Neue',sans-serif;min-height:100vh;overscroll-behavior:none}
#app{max-width:430px;margin:0 auto;min-height:100vh}
button{cursor:pointer;font-family:inherit;transition:opacity .15s}
button:active{opacity:.7}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--bg2);border-top:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:430px;animation:slideUp .25s ease-out;padding-bottom:max(24px,env(safe-area-inset-bottom))}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.handle{width:40px;height:4px;background:var(--bg3);border-radius:2px;margin:12px auto 0}
.badge{font-size:9px;padding:2px 5px;border-radius:4px;letter-spacing:.1em;display:inline-block}
.badge-a{background:var(--lime-dim);color:var(--lime)}
.badge-b{background:var(--amber-dim);color:var(--amber)}
.badge-swap{background:rgba(251,191,36,.15);color:var(--amber)}
.badge-drop{color:var(--rose)}
.badge-fin{background:rgba(244,114,182,.15);color:var(--pink)}
</style>
</head>

const ALTS={
  chest:['Bench Press','Incline Bench Press','DB Bench Press','Incline DB Press','Chest Press Machine','Pec Deck Fly','Cable Fly','Push Up','Dips'],
  tri:['Triceps Pushdown (Bar)','Triceps Pushdown (Rope)','Cable Kickback','Skull Crusher','Overhead Tricep Extension','Diamond Push Up'],
  back:['Lat Pull Down (Wide)','Lat Pull Down (Narrow)','Pull Up','Chin Up','Seated Row','Bent Over Row','T-Bar Row','One Arm DB Row','High Row'],
  bi:['Barbell Curl','Dumbbell Curl','Hammer Curl','Preacher Curl','Cable Curl','Incline DB Curl'],
  shoulder:['Shoulder Press (Machine)','DB Shoulder Press','Military Press','Arnold Press','Wall Slide DB Press'],
  side:['Side Lateral Raise (DB)','Cable Lateral Raise','Machine Lateral Raise'],
  rear:['Reverse Pec Deck','Bent Over Lateral Raise','Face Pull','Y-Raise'],
  leg:['Squat','Leg Press','Hack Squat','Bulgarian Split Squat','Lunges','Romanian Deadlift','Leg Extension','Leg Curl'],
  glute:['Hip Thrust','Glute Bridge','Standing Hip Abduction','Hip Abduction'],
};
const CAT={chest:'가슴',tri:'삼두',back:'등',bi:'이두',shoulder:'어깨',side:'측면',rear:'후면',leg:'하체',glute:'엉덩이'};

// ═══════════════════════════════════
// STORAGE & HELPERS
// ═══════════════════════════════════
function load(){try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);if(!d.savedRoutines)d.savedRoutines={};if(!d.savedExercises)d.savedExercises={};return d;}}catch(e){}return{exercises:JSON.parse(JSON.stringify(EX)),sessions:[],savedRoutines:{},savedExercises:{}};}
function save(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}}
function ft(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function fd(d){const t=new Date(d);return t.getFullYear()+'.'+String(t.getMonth()+1).padStart(2,'0')+'.'+String(t.getDate()).padStart(2,'0');}
function fdf(d){const t=new Date(d);return fd(d)+' ('+DAY[t.getDay()]+')';}
function ago(d){const n=Math.floor((Date.now()-new Date(d).getTime())/86400000);return n===0?'오늘':n===1?'어제':n+'일 전';}
function plan(ex){const p=[];for(let i=0;i<ex.sets;i++)p.push(i<ex.sets-ex.targetCount?ex.baseW:ex.targetW);return p;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function rnd(w){ // 2.5kg 단위 반올림
  if(w<=0)return 0;
  return Math.round(w/2.5)*2.5;
}
// 훈련법별 세트 생성. baseW = 사용자가 입력한 메인 중량
function applyMethod(method, mainW, reps){
  const W=parseFloat(mainW)||0;
  switch(method){
    case 'pyramid': // 피라미드: 가벼운→무거운, 횟수 감소
      return [
        {w:String(rnd(W*0.6)),r:String(reps+5),done:false},
        {w:String(rnd(W*0.75)),r:String(reps+2),done:false},
        {w:String(rnd(W*0.9)),r:String(reps),done:false},
        {w:String(rnd(W)),r:String(Math.max(reps-2,1)),done:false},
      ];
    case 'drop': // 드랍세트: 현재 세트 유지 + 80%, 60% 2세트 추가
      return null; // drop은 applyM에서 특수 처리
    case 'top': // 탑세트: 점진적으로 올려 마지막이 최고 중량
      return [
        {w:String(rnd(W*0.85)),r:String(reps),done:false},
        {w:String(rnd(W*0.9)),r:String(reps),done:false},
        {w:String(rnd(W*0.95)),r:String(Math.max(reps-2,1)),done:false},
        {w:String(rnd(W)),r:String(Math.max(reps-3,1)),done:false,top:true},
      ];
    case 'straight': // 일반(스트레이트): 전 세트 동일 중량
      return [
        {w:String(rnd(W)),r:String(reps),done:false},
        {w:String(rnd(W)),r:String(reps),done:false},
        {w:String(rnd(W)),r:String(reps),done:false},
        {w:String(rnd(W)),r:String(reps),done:false},
      ];
    default: return null;
  }
}
const METHOD_LABELS={pyramid:'피라미드',drop:'+ 드랍추가',top:'탑세트',straight:'일반세트',progressive:'점진적 과부하'};

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
const S={
  view:'home', tab:'A',
  routineId:null, sessionId:null,
  data:load(),
  // workout
  ws:'idle', wRes:{}, wSwap:{}, wExp:null,
  wEl:0, wAcc:0, wRun:null, wRest:null, wRS:0,
};
let _tmr=null;

// ═══════════════════════════════════
// TIMER
// ═══════════════════════════════════
function startTmr(){
  clearInterval(_tmr);
  _tmr=setInterval(()=>{
    if(S.ws==='running') S.wEl=S.wAcc+Math.floor((Date.now()-S.wRun)/1000);
    if(S.wRest) S.wRS=Math.floor((Date.now()-S.wRest)/1000);
    const el=document.getElementById('t-el'); if(el) el.textContent=ft(S.wEl);
    const rl=document.getElementById('t-rest');
    if(rl){
      rl.textContent=S.wRest?ft(S.wRS):'00:00';
      const rb=document.getElementById('t-rbox');
      if(rb){
        rb.style.background=S.wRest?'var(--amber-dim)':'var(--bg2)';
        rb.style.borderColor=S.wRest?'var(--amber-bd)':'var(--border)';
        rl.style.color=S.wRest?'var(--amber)':'var(--bg4)';
      }
    }
  },1000);
}
function stopTmr(){clearInterval(_tmr);_tmr=null;}

// ═══════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════
function go(view,extra){
  if(view!=='workout'){stopTmr();S.ws='idle';S.wEl=0;S.wAcc=0;S.wRun=null;S.wRest=null;S.wRS=0;S.wRes={};S.wSwap={};S.wExp=null;}
  S.view=view;
  if(extra)Object.assign(S,extra);
  render();
}

function initW(rid){
  S.routineId=rid;
  const exs=S.data.exercises[rid]||[];
  S.wRes={};
  exs.forEach(ex=>{const p=plan(ex);S.wRes[ex.id]=p.map(w=>({w:String(w),r:String(ex.reps),done:false}));});
  S.wSwap={};S.wExp=exs[0]?.id||null;S.ws='idle';S.wEl=0;S.wAcc=0;S.wRun=null;S.wRest=null;S.wRS=0;
  S.view='workout';render();startTmr();
}

// ═══════════════════════════════════
// WORKOUT ACTIONS
// ═══════════════════════════════════
function startW(){S.ws='running';S.wRun=Date.now();updCtrl();}
function pauseW(){if(S.wRun)S.wAcc+=Math.floor((Date.now()-S.wRun)/1000);S.ws='paused';S.wRun=null;hidePause();updCtrl();}
function resumeW(){S.wRun=Date.now();S.ws='running';updCtrl();}

function updCtrl(){
  const btn=document.getElementById('pause-small-btn'); if(!btn)return;
  btn.textContent=S.ws==='running'?'⏸':'▶';
}

function showPause(){
  if(S.ws==='idle') startW();
  document.getElementById('pause-ov').style.display='flex';
}
function hidePause(){const o=document.getElementById('pause-ov');if(o)o.style.display='none';}
function stopGo(){hidePause();go('home');}

function chk(eid,idx){
  if(S.ws==='idle')startW();
  const s=S.wRes[eid][idx]; s.done=!s.done;
  if(s.done){S.wRest=Date.now();S.wRS=0;}
  updSetRow(eid,idx); updCount(); updSaveBtn();
}

function togFail(eid,idx){
  const s=S.wRes[eid][idx];
  s.fail=!s.fail;
  if(s.fail){ S.wRest=Date.now(); S.wRS=0; }
  reRenderExList();
  updSaveBtn();
}

function applyM(eid,method){
  const exs=S.data.exercises[S.routineId]||[];
  const ex=exs.find(e=>e.id===eid); if(!ex)return;
  if(ex.bw){ // 맨몸운동은 중량 변환 불가
    alert('맨몸 운동은 훈련법 자동 변환이 안 돼요. 세트/횟수만 직접 조절하세요.');
    return;
  }
  if(method==='progressive'){
    // 점진적 과부하: baseW/targetW 패턴 복원
    const p=plan(ex);
    S.wRes[eid]=p.map(w=>({w:String(w),r:String(ex.reps),done:false}));
  }else if(method==='drop'){
    // 드랍세트: 마지막 세트 중량 기준으로 80%, 60% 2세트 아래에 추가
    const cur=S.wRes[eid]||[];
    const lastW=cur.length?parseFloat(cur[cur.length-1].w)||ex.targetW:ex.targetW;
    const lastR=cur.length?parseInt(cur[cur.length-1].r)||ex.reps:ex.reps;
    cur.push({w:String(rnd(lastW*0.8)),r:String(lastR),done:false,drop:true});
    cur.push({w:String(rnd(lastW*0.6)),r:String(lastR),done:false,drop:true});
    S.wRes[eid]=cur;
  }else{
    // 입력된 마지막 세트 중량을 메인 중량으로 사용 (없으면 targetW)
    const cur=S.wRes[eid];
    const mainW=cur&&cur.length?(parseFloat(cur[cur.length-1].w)||ex.targetW):ex.targetW;
    const newSets=applyMethod(method,mainW,ex.reps);
    if(newSets)S.wRes[eid]=newSets;
  }
  reRenderExList();
  updCount(); updSaveBtn();
}

function delEx(eid){
  const exs=S.data.exercises[S.routineId]||[];
  const ex=exs.find(e=>e.id===eid); if(!ex)return;
  if(!confirm('"'+(ex.name)+'" 종목을 이 루틴에서 삭제할까요?'))return;
  S.data.exercises[S.routineId]=exs.filter(e=>e.id!==eid);
  delete S.wRes[eid]; delete S.wSwap[eid];
  if(S.wExp===eid)S.wExp=null;
  save(S.data);
  reRenderExList();
  updCount(); updSaveBtn();
}

// 종목 단위 저장 - 종목 라이브러리에 추가
function saveEx(eid){
  const exs=S.data.exercises[S.routineId]||[];
  const ex=exs.find(e=>e.id===eid); if(!ex)return;
  const swap=S.wSwap[eid];
  const baseName=swap?swap.name:ex.name;
  const name=prompt('저장할 종목 이름:', baseName);
  if(!name||!name.trim())return;
  // 현재 화면의 세트/중량/횟수 스냅샷도 같이 저장
  const sets=S.wRes[eid]||[];
  if(!S.data.savedExercises)S.data.savedExercises={};
  S.data.savedExercises[name.trim()]={
    name:name.trim(),
    machine:ex.machine,
    sub:ex.sub,
    cat:ex.cat||[],
    sets:ex.sets,
    reps:ex.reps,
    baseW:ex.baseW,
    targetW:ex.targetW,
    targetCount:ex.targetCount,
    bw:ex.bw,
    drop:ex.drop,
    fin:ex.fin,
    _savedSets:sets.map(s=>({w:s.w,r:s.r})),
    savedAt:new Date().toISOString()
  };
  save(S.data);
  alert('"'+name.trim()+'" 종목이 라이브러리에 저장됐어요.');
}

// 종목 라이브러리 모달
function openExLib(){
  const old=document.getElementById('el-ov'); if(old)old.remove();
  const se=S.data.savedExercises||{};
  const keys=Object.keys(se);

function addExFromLib(name){
  const se=S.data.savedExercises||{};
  const lib=se[name]; if(!lib)return;
  // 새 ID로 종목 생성
  const newEx={
    id:'cust_'+Date.now(),
    name:lib.name,
    machine:lib.machine,
    sub:lib.sub,
    cat:lib.cat||[],
    sets:lib.sets||3,
    reps:lib.reps||10,
    baseW:lib.baseW||0,
    targetW:lib.targetW||0,
    targetCount:lib.targetCount||1,
    bw:lib.bw,
    drop:lib.drop,
    fin:lib.fin
  };
  if(!S.data.exercises[S.routineId])S.data.exercises[S.routineId]=[];
  S.data.exercises[S.routineId].push(newEx);
  // 저장된 세트값 복원
  if(lib._savedSets&&lib._savedSets.length){
    S.wRes[newEx.id]=lib._savedSets.map(s=>({w:s.w,r:s.r,done:false}));
  }else{
    const p=plan(newEx);
    S.wRes[newEx.id]=p.map(w=>({w:String(w),r:String(newEx.reps),done:false}));
  }
  S.wExp=newEx.id;
  save(S.data);
  const o=document.getElementById('el-ov'); if(o)o.remove();
  reRenderExList(); updCount(); updSaveBtn();
}

function delSavedEx(name){
  if(!confirm('"'+name+'" 저장된 종목을 삭제할까요?'))return;
  delete S.data.savedExercises[name];
  save(S.data);
  openExLib();
}

function saveRoutine(){
  const name=prompt('저장할 루틴 이름을 입력하세요:', RM[S.routineId]?.part+' 커스텀');
  if(!name||!name.trim())return;
  // 현재 종목 + 현재 화면의 세트/중량/횟수를 통째로 저장
  const exs=S.data.exercises[S.routineId]||[];
  const snapshot=exs.map(ex=>{
    const sets=S.wRes[ex.id]||[];
    return Object.assign({},ex,{
      _savedSets: sets.map(s=>({w:s.w,r:s.r}))
    });
  });
  if(!S.data.savedRoutines)S.data.savedRoutines={};
  S.data.savedRoutines[name.trim()]={
    baseRoutineId:S.routineId,
    day:RM[S.routineId]?.day,
    part:RM[S.routineId]?.part,
    exercises:snapshot,
    savedAt:new Date().toISOString()
  };
  save(S.data);
  alert('"'+name.trim()+'" 루틴이 저장됐어요. 다음에 불러오기에서 사용할 수 있어요.');
}

function loadRoutine(name){
  const sr=S.data.savedRoutines||{};
  const r=sr[name]; if(!r)return;
  // 저장된 루틴을 현재 루틴에 적용
  S.data.exercises[S.routineId]=r.exercises.map(ex=>{
    const c=Object.assign({},ex); delete c._savedSets; return c;
  });
  // 저장된 세트값 복원
  S.wRes={};
  r.exercises.forEach(ex=>{
    if(ex._savedSets&&ex._savedSets.length){
      S.wRes[ex.id]=ex._savedSets.map(s=>({w:s.w,r:s.r,done:false}));
    }else{
      const p=plan(ex);
      S.wRes[ex.id]=p.map(w=>({w:String(w),r:String(ex.reps),done:false}));
    }
  });
  S.wSwap={}; S.wExp=S.data.exercises[S.routineId][0]?.id||null;
  save(S.data);
  const o=document.getElementById('lr-ov'); if(o)o.remove();
  vWorkout(); startTmr();
}

function delRoutine(name){
  if(!confirm('"'+name+'" 저장된 루틴을 삭제할까요?'))return;
  delete S.data.savedRoutines[name];
  save(S.data);
  openLoadRoutine();
}

// 종목 순서 변경
function moveEx(eid, dir){
  const exs=S.data.exercises[S.routineId]||[];
  const i=exs.findIndex(e=>e.id===eid);
  if(i<0)return;
  const ti=dir==='up'?i-1:i+1;
  if(ti<0||ti>=exs.length)return;
  // swap
  const tmp=exs[i]; exs[i]=exs[ti]; exs[ti]=tmp;
  save(S.data);
  reRenderExList();
}

function addExDirect(){
  const name=(document.getElementById('ae-name').value||'').trim();

  const bw=document.getElementById('ae-bw').checked;
  const sets=parseInt(document.getElementById('ae-sets').value)||3;

  const baseW=bw?0:(parseFloat(document.getElementById('ae-basew').value)||0);
  const targetW=bw?0:(parseFloat(document.getElementById('ae-targetw').value)||baseW);
  const fin=document.getElementById('ae-fin').checked;
  const newEx={
    id:'cust_'+Date.now(),
    name, sets, reps, baseW, targetW,
    targetCount:1, bw, fin,
    cat:['chest'], // 기본 카테고리 (나중에 대체 시 변경 가능)
  };
  if(!S.data.exercises[S.routineId])S.data.exercises[S.routineId]=[];
  S.data.exercises[S.routineId].push(newEx);
  // 세트 초기화
  const p=plan(newEx);
  S.wRes[newEx.id]=p.map(w=>({w:String(w),r:String(reps),done:false}));

}

    +'</div>'
    +'<div style="font-size:10px;color:var(--text3);margin-bottom:4px">현재</div>'
    +'<div style="font-size:14px;font-weight:600">'+esc(swap?swap.name:ex.name)+(swap?'<span class="badge badge-swap" style="margin-left:6px">대체중</span>':'')+'</div>'
    +(swap?'<div style="font-size:11px;color:var(--text3);margin-top:2px">원래: '+esc(ex.name)+'</div>':'')
    +'</div>'
    +'<div style="flex:1;overflow-y:auto;padding:16px 20px">'+altsH
    +'<div><div style="font-size:10px;letter-spacing:.2em;color:var(--text3);margin-bottom:8px">직접 입력</div>'
    +'<div style="display:flex;gap:8px">'
    +'<input id="csi" data-eid="'+esc(eid)+'" type="text" placeholder="종목 이름..." style="flex:1;padding:10px 12px;background:rgba(10,10,10,.6);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none">'
    +'<button id="csi-btn" data-eid="'+esc(eid)+'" style="padding:10px 16px;background:var(--text);color:#0a0a0a;border:none;border-radius:8px;font-weight:700;font-size:14px">선택</button>'
    +'</div></div></div>'
    +(swap?'<div style="padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0"><button id="rev-swap-btn" data-eid="'+esc(eid)+'" style="width:100%;padding:10px;border:1px solid var(--border2);background:none;color:var(--text2);border-radius:10px;font-size:14px">↩ 원래 종목으로 되돌리기</button></div>':'')
    +'</div>';
  document.body.appendChild(div);
  // 이벤트 위임으로 버튼 처리
  div.querySelectorAll('.swap-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      selSwap(this.dataset.eid, this.dataset.name);
    });
  });
  const csiInput=div.querySelector('#csi');
  const csiBtn=div.querySelector('#csi-btn');
  if(csiInput) csiInput.addEventListener('keydown',function(e){if(e.key==='Enter'&&this.value.trim())selSwap(eid,this.value.trim());});
  if(csiBtn) csiBtn.addEventListener('click',function(){const v=csiInput?csiInput.value.trim():'';if(v)selSwap(eid,v);});
  const revBtn=div.querySelector('#rev-swap-btn');
  if(revBtn) revBtn.addEventListener('click',function(){revSwap(eid);});
}

function closeSwap(){const o=document.getElementById('sw-ov');if(o)o.remove();}
function selSwap(eid,name){
  S.wSwap[eid]={name};closeSwap();
  const ne=document.getElementById('en-'+eid);if(ne)ne.textContent=name;
  const be=document.getElementById('sb-'+eid);if(be)be.style.display='inline';
  const sc=document.getElementById('sc-'+eid);if(sc)sc.style.color='var(--amber)';
}
function revSwap(eid){
  delete S.wSwap[eid];closeSwap();
  const exs=S.data.exercises[S.routineId]||[];const ex=exs.find(e=>e.id===eid);
  const ne=document.getElementById('en-'+eid);if(ne&&ex)ne.textContent=ex.name;
  const be=document.getElementById('sb-'+eid);if(be)be.style.display='none';
  const sc=document.getElementById('sc-'+eid);if(sc)sc.style.color='var(--text3)';
}

function doSave(){
  const hasDone=Object.values(S.wRes).some(s=>s.some(x=>x.done));
  if(!hasDone){ if(!confirm('완료된 세트가 없어요. 그래도 저장할까요?')) return; }
  const sess={id:'s_'+Date.now(),date:new Date().toISOString(),routineId:S.routineId,durationSec:S.wEl,results:{},swaps:{}};
  const exs=S.data.exercises[S.routineId]||[];
  const newEx=JSON.parse(JSON.stringify(S.data.exercises));
  newEx[S.routineId]=exs.map(ex=>{
    const sets=S.wRes[ex.id]; if(!sets||!sets.some(s=>s.done))return ex;
    sess.results[ex.id]=sets.map(s=>({weight:parseFloat(s.w)||0,reps:parseInt(s.r)||0,done:s.done,fail:!!s.fail}));
    if(S.wSwap[ex.id]){sess.swaps[ex.id]=S.wSwap[ex.id];return ex;}
    if(ex.bw)return ex;
    const last=sets[sets.length-1];
    // 마지막 세트가 실패 표시면 중량 안 올림
    const anyFail=sets.some(s=>s.fail);
    if(last.done&&!last.fail&&!anyFail&&parseFloat(last.w)>=ex.targetW&&parseInt(last.r)>=ex.reps&&ex.targetCount<ex.sets)return Object.assign({},ex,{targetCount:ex.targetCount+1});
    return ex;
  });
  S.data={...S.data,exercises:newEx,sessions:[...S.data.sessions,sess]};
  save(S.data);go('home');
}

// RENDER: SET ROW
// ═══════════════════════════════════
function mkSR(ex,s,idx,isA){
  const wv=(s.w==='0'||s.w===0)?'':String(s.w);
  const acBg=isA?'var(--lime-dim)':'var(--amber-dim)';
  const acBd=isA?'var(--lime-bd)':'var(--amber-bd)';
  const acSol=isA?'var(--lime)':'var(--amber)';
  const failed=s.fail;
  const bg=failed?'rgba(251,113,133,.12)':(s.done?acBg:'rgba(10,10,10,.5)');
  const bd=failed?'var(--rose-bd)':(s.done?acBd:'var(--border)');
  return '<div id="sr-'+ex.id+'-'+idx+'" style="display:flex;align-items:center;gap:8px;padding:8px;border-radius:10px;border:1px solid '+bd+';background:'+bg+';margin-bottom:6px">'
    +'<button class="sb" onclick="chk(\''+ex.id+'\','+idx+')" style="width:36px;height:36px;border-radius:8px;border:none;font-weight:700;font-family:var(--mono);font-size:12px;background:'+(s.done?acSol:'var(--bg3)')+';color:'+(s.done?'#0a0a0a':'var(--text3)')+'">'+( s.done?'✓':String(idx+1))+'</button>'
    +(s.drop?'<span style="font-size:8px;padding:2px 4px;border-radius:3px;background:rgba(251,113,133,.15);color:var(--rose);font-weight:700;letter-spacing:.1em;flex-shrink:0">DROP</span>':'')
    +(!ex.bw?'<div style="flex:1;display:flex;align-items:center;gap:4px;min-width:0">'
      +'<input type="number" inputmode="decimal" step="0.5" value="'+esc(wv)+'" placeholder="0" oninput="setW(\''+ex.id+'\','+idx+',this.value)" onfocus="this.select()" style="width:100%;background:none;border:none;outline:none;color:'+(failed?'var(--rose)':'var(--text)')+';font-family:var(--mono);font-size:16px;font-weight:600;text-align:right">'
      +'<span style="font-size:11px;color:var(--text3);white-space:nowrap">kg</span>'
      +'</div>'
      +'<span style="color:var(--border2);font-size:12px">×</span>':'')
    +'<div style="display:flex;align-items:center;gap:4px;'+(ex.bw?'flex:1':'width:56px')+'">'
    +'<input type="number" inputmode="numeric" value="'+esc(s.r)+'" placeholder="0" oninput="setR(\''+ex.id+'\','+idx+',this.value)" onfocus="this.select()" style="width:100%;background:none;border:none;outline:none;color:'+(failed?'var(--rose)':'var(--text)')+';font-family:var(--mono);font-size:16px;font-weight:600;text-align:right">'
    +'<span style="font-size:11px;color:var(--text3);width:20px">회</span>'
    +'</div>'
    +'<button onclick="togFail(\''+ex.id+'\','+idx+')" title="실패 표시" style="width:30px;height:30px;border-radius:7px;border:1px solid '+(failed?'var(--rose-bd)':'var(--border)')+';background:'+(failed?'var(--rose-dim)':'none')+';color:'+(failed?'var(--rose)':'var(--text3)')+';font-size:14px;font-weight:700;flex-shrink:0">✕</button>'
    +'</div>';
}

function mkEx(ex,idx,lastSess,isA){
  const swap=S.wSwap[ex.id];
  const dname=swap?swap.name:ex.name;
  const sets=S.wRes[ex.id]||[];
  const done=sets.filter(s=>s.done).length;
  const allDone=done===sets.length&&sets.length>0;
  const exp=S.wExp===ex.id;
  const acBd=isA?'var(--lime-bd)':'var(--amber-bd)';
  const acSol=isA?'var(--lime)':'var(--amber)';
  const bdColor=allDone?acBd:(swap?'rgba(251,191,36,.3)':'var(--border)');

  let lastH='';
  const lr=!swap?lastSess?.results?.[ex.id]:null;
  if(lr){
    const p=plan(ex);
    const items=lr.map((s,i)=>{const ok=!s.fail&&s.weight>=(p[i]??ex.targetW)&&s.reps>=ex.reps;const failed=s.fail;return '<span style="padding:2px 6px;border-radius:4px;font-size:11px;font-family:var(--mono);background:'+(failed?'rgba(251,113,133,.18)':ok?'rgba(110,231,183,.1)':'rgba(251,113,133,.1)')+';color:'+(failed||!ok?'var(--rose)':'var(--emerald)')+'">'+(failed?'✕ ':'')+( ex.bw?s.reps+'회':s.weight+'×'+s.reps)+'</span>';}).join('');
    lastH='<div style="margin:12px 0;padding:8px 12px;background:rgba(10,10,10,.6);border:1px solid rgba(38,38,38,.6);border-radius:8px"><div style="font-size:9px;letter-spacing:.2em;color:var(--text3);margin-bottom:6px">지난 기록 · '+ago(lastSess.date)+'</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+items+'</div></div>';
  }

  let bodyH='<div class="ex-body" data-id="'+ex.id+'" style="'+(exp?'':'display:none')+';padding:12px 16px 16px;border-top:1px solid var(--border)">';
  if(exp){
    bodyH+=lastH;
    if(swap)bodyH+='<div style="margin:12px 0;padding:8px 12px;background:rgba(251,191,36,.05);border:1px solid rgba(251,191,36,.2);border-radius:8px;font-size:11px;color:rgba(253,224,171,.8)">원래 종목 <strong style="color:var(--amber)">'+esc(ex.name)+'</strong> 대신 진행 중.</div>';
    const wasSwap=lastSess?.swaps?.[ex.id];
    if(!swap&&wasSwap&&!lr)bodyH+='<div style="margin:12px 0;padding:8px 12px;background:rgba(10,10,10,.6);border:1px solid var(--border);border-radius:8px;font-size:11px;color:var(--text3)">지난 기록은 다른 종목으로 진행했어요 ('+esc(wasSwap.name)+')</div>';
    // 훈련법 버튼
    bodyH+='<div style="margin:12px 0"><div style="font-size:9px;letter-spacing:.2em;color:var(--text3);margin-bottom:6px">훈련법 (입력 중량 기준 자동 세팅)</div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
      +['progressive','straight','pyramid','top','drop'].map(m=>'<button onclick="applyM(\''+ex.id+'\',\''+m+'\')" style="flex:1;min-width:60px;padding:7px 4px;border:1px solid var(--border);background:none;color:var(--text2);border-radius:8px;font-size:11px;font-weight:600">'+METHOD_LABELS[m]+'</button>').join('')
      +'</div></div>';
    bodyH+='<div style="margin-top:12px">';
    sets.forEach((s,i)=>{ bodyH+=mkSR(ex,s,i,isA); });
    bodyH+='</div>';
    bodyH+='<div style="display:flex;gap:8px;margin-top:10px">'
      +'<button onclick="remSet(\''+ex.id+'\')" '+(sets.length<=1?'disabled':'')+' style="flex:1;padding:8px;border:1px solid var(--border);background:none;color:'+(sets.length<=1?'var(--border)':'var(--text3)')+';border-radius:8px;font-size:11px;letter-spacing:.1em">− 세트 삭제</button>'
      +'<button onclick="addSet(\''+ex.id+'\')" style="flex:1;padding:8px;border:1px solid var(--border);background:none;color:var(--text3);border-radius:8px;font-size:11px;letter-spacing:.1em">+ 세트 추가</button>'
      +'</div>';
    if(!allDone)bodyH+='<button onclick="markAll(\''+ex.id+'\')" style="width:100%;margin-top:8px;padding:8px;border:1px solid var(--border);background:none;color:var(--text3);border-radius:8px;font-size:11px;letter-spacing:.1em">전 세트 완료 표시</button>';
    // 종목 액션 (저장 / 삭제)
    bodyH+='<div style="display:flex;gap:8px;margin-top:8px">'
      +'<button onclick="saveEx(\''+ex.id+'\')" style="flex:1;padding:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);border-radius:8px;font-size:11px;letter-spacing:.1em;font-weight:600">💾 이 종목 저장</button>'
      +'<button onclick="delEx(\''+ex.id+'\')" style="flex:1;padding:8px;border:1px solid var(--rose-bd);background:var(--rose-dim);color:var(--rose);border-radius:8px;font-size:11px;letter-spacing:.1em;font-weight:600">🗑 이 종목 삭제</button>'
      +'</div>';
  }
  bodyH+='</div>';

  const sm=sets.map(s=>ex.bw?'체중':s.w).join('·')+' × '+(sets[0]?.r??ex.reps);
  return '<div id="ex-'+ex.id+'" style="background:var(--bg2);border:1px solid '+bdColor+';border-radius:12px;margin-bottom:10px">'
    +'<div style="display:flex;align-items:center;padding:12px 16px;gap:4px">'
    +'<button onclick="togExp(\''+ex.id+'\')" style="flex:1;display:flex;align-items:center;gap:12px;background:none;border:none;text-align:left">'
    +'<div style="width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:var(--mono);background:'+(allDone?acSol:'var(--bg3)')+';color:'+(allDone?'#0a0a0a':'var(--text3)')+';flex-shrink:0">'+(allDone?'✓':String(idx+1).padStart(2,'0'))+'</div>'
    +'<div style="flex:1;min-width:0">'
    +'<div style="font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap">'
    +'<span id="en-'+ex.id+'" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)">'+esc(dname)+'</span>'
    +(swap?'<span id="sb-'+ex.id+'" class="badge badge-swap">대체</span>':'<span id="sb-'+ex.id+'" class="badge badge-swap" style="display:none">대체</span>')
    +(ex.drop&&!swap?'<span class="badge badge-drop">DROP</span>':'')
    +(ex.fin&&!swap?'<span class="badge badge-fin">마무리</span>':'')
    +'</div>'
    +'<div id="sm-'+ex.id+'" style="font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)">'
    +(!swap&&ex.machine?'<span style="margin-right:6px">· '+esc(ex.machine)+'</span>':'')
    +(!swap&&ex.sub?'<span style="margin-right:6px">'+esc(ex.sub)+'</span>':'')
    +sm+'</div>'
    +'</div>'
    +'</button>'
    +'<button id="sc-'+ex.id+'" onclick="openSwap(\''+ex.id+'\')" style="background:none;border:none;padding:8px;color:'+(swap?'var(--amber)':'var(--text3)')+';font-size:16px">⇄</button>'
    +'<div style="display:flex;flex-direction:column;gap:1px">'
    +'<button onclick="moveEx(\''+ex.id+'\',\'up\')" style="background:none;border:none;padding:3px 6px;color:var(--text3);font-size:11px;line-height:1" '+(idx===0?'disabled style="opacity:.2"':'')+'>▲</button>'
    +'<button onclick="moveEx(\''+ex.id+'\',\'down\')" style="background:none;border:none;padding:3px 6px;color:var(--text3);font-size:11px;line-height:1">▼</button>'
    +'</div>'
    +'<button onclick="togExp(\''+ex.id+'\')" style="background:none;border:none;padding:8px;color:var(--text3);display:flex;align-items:center;gap:4px">'
    +'<span id="cnt-'+ex.id+'" style="font-size:10px;font-family:var(--mono)">'+done+'/'+sets.length+'</span>'
    +'<span class="ex-chev" data-id="'+ex.id+'" style="font-size:10px">'+(exp?'▲':'▼')+'</span>'
    +'</button>'
    +'</div>'+bodyH+'</div>';
}

    +'</div>';
}

// ═══════════════════════════════════
// VIEW: WORKOUT
// ═══════════════════════════════════
function vWorkout(){
  const routine=RM[S.routineId];
  const exs=S.data.exercises[S.routineId]||[];
  const isA=routine.day==='A';
  const ac=isA?'var(--lime)':'var(--amber)';
  const has=Object.values(S.wRes).some(s=>s.some(x=>x.done));
  const lastSess=[...S.data.sessions].filter(s=>s.routineId===S.routineId).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const n=Object.values(S.wRes).filter(s=>s.some(x=>x.done)).length;
  const exCards=exs.map((ex,i)=>mkEx(ex,i,lastSess,isA)).join('');

  document.getElementById('app').innerHTML='<div style="padding-bottom:48px">'
    +'<div style="position:sticky;top:0;background:rgba(10,10,10,.95);backdrop-filter:blur(12px);z-index:10;border-bottom:1px solid var(--border);padding:env(safe-area-inset-top) 20px 12px;padding-top:max(12px,env(safe-area-inset-top))">'
    // 제목 한 줄
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
    +'<span style="font-size:22px;font-weight:700;color:'+ac+';font-family:var(--mono)">'+routine.day+'</span>'
    +'<span style="font-size:17px;font-weight:700;flex:1">'+esc(routine.part)+'</span>'
    +'<span style="font-size:11px;color:var(--text3);font-family:var(--mono)">'+fd(new Date())+'</span>'
    +'</div>'
    // 휴식 타이머 (크게 48px)
    +'<div id="t-rbox" style="border:2px solid var(--border);background:var(--bg2);border-radius:16px;padding:10px 16px;margin-bottom:8px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">'
    +'<div style="display:flex;align-items:center;gap:6px"><span style="font-size:13px">⏱</span><span style="font-size:9px;letter-spacing:.3em;color:var(--text3)">휴식 시간</span></div>'
    +'<button onclick="S.wRest=null;S.wRS=0;" style="background:none;border:none;font-size:11px;color:var(--amber)">정지</button>'
    +'</div>'
    +'<div id="t-rest" style="font-family:var(--mono);font-size:48px;font-weight:700;line-height:1;color:var(--bg4)">00:00</div>'
    +'</div>'
    // 하단 행: 운동완료 버튼(좌) + 전체운동시간+일시정지(우) 2등분
    +'<div style="display:flex;gap:8px;margin-bottom:6px">'
    // 운동완료 버튼 (일시정지 팝업 트리거)
    +'<button onclick="doSave()" id="ctrl-btn" style="flex:1;background:'+ac+';color:#0a0a0a;border:none;padding:12px;border-radius:12px;font-weight:700;font-size:15px">운동 완료</button>'
    // 전체운동시간 + 일시정지 작은 버튼
    +'<div style="flex:1;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:12px">'
    +'<div style="display:flex;align-items:center;gap:6px">'
    +'<span style="font-size:13px">🕐</span>'
    +'<div><div style="font-size:9px;color:var(--text3);letter-spacing:.1em">운동 시간</div>'
    +'<div id="t-el" style="font-size:20px;font-weight:700;font-family:var(--mono);color:var(--text3)">'+ft(S.wEl)+'</div>'
    +'</div></div>'
    +'<button id="pause-small-btn" onclick="S.ws===\'running\'?pauseW():resumeW()" style="background:var(--bg3);border:none;border-radius:8px;padding:6px 10px;color:var(--text2);font-size:16px">'+(S.ws==='running'?'⏸':'▶')+'</button>'
    +'</div>'
    +'</div>'
    +'</div>'
    // Exercise list
    +'<div id="ex-list" style="padding:16px 20px">'+exCards+'</div>'
    // 루틴 저장/불러오기
    +'<div style="padding:0 20px 24px">'
    +'<div style="font-size:9px;letter-spacing:.2em;color:var(--text3);margin-bottom:8px">루틴 · 종목 관리</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:8px">'
    +'<button onclick="saveRoutine()" style="flex:1;padding:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);border-radius:10px;font-size:12px;font-weight:600">💾 루틴 저장</button>'
    +'<button onclick="openLoadRoutine()" style="flex:1;padding:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);border-radius:10px;font-size:12px;font-weight:600">📂 루틴 불러오기</button>'
    +'</div>'
    +'<div style="display:flex;gap:8px;margin-top:8px">'
    +'<button onclick="openAddEx()" style="flex:1;padding:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);border-radius:10px;font-size:12px;font-weight:600">✏️ 종목 직접 추가</button>'
    +'<button onclick="openExLib()" style="flex:1;padding:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);border-radius:10px;font-size:12px;font-weight:600">📂 종목 불러오기</button>'
    +'</div>'
    +'</div>'
    // 일시정지 오버레이 — 저장+일시정지만
    +'<div id="pause-ov" class="overlay" style="display:none" onclick="hidePause()">'
    +'<div class="sheet" onclick="event.stopPropagation()">'
    +'<div class="handle"></div>'
    +'<div style="padding:16px 20px">'
    +(has?'<button onclick="hidePause();doSave()" style="width:100%;padding:16px;background:'+ac+';border:none;border-radius:16px;color:#0a0a0a;font-weight:700;font-size:16px;margin-bottom:10px">✓ 운동 완료 저장</button>':'')
    +'<button onclick="pauseW()" style="width:100%;padding:16px;background:var(--bg3);border:none;border-radius:16px;color:var(--text);font-weight:700;font-size:16px;margin-bottom:10px">⏸ 일시정지</button>'
    +'<button onclick="hidePause()" style="width:100%;padding:12px;background:none;border:none;color:var(--text3);font-size:14px">계속 운동하기</button>'
    +'</div></div></div>'
    +'</div>';
}

// ═══════════════════════════════════
// VIEW: HISTORY
// ═══════════════════════════════════
function vHistory(){
  const y=S.hY||(S.hY=new Date().getFullYear());
  const m=S.hM!==undefined?S.hM:(S.hM=new Date().getMonth());
  const today=new Date();
  const tk=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  const sbd={};
  S.data.sessions.forEach(s=>{const d=new Date(s.date);const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(!sbd[k])sbd[k]=[];sbd[k].push(s);});
  const fd2=new Date(y,m,1).getDay();const dim=new Date(y,m+1,0).getDate();
  const cells=[];for(let i=0;i<fd2;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);while(cells.length%7!==0)cells.push(null);
  let calH='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px">';
  ['일','월','화','수','목','금','토'].forEach((d,i)=>{calH+='<div style="text-align:center;font-size:11px;padding:4px;color:'+(i===0?'rgba(251,113,133,.7)':i===6?'rgba(96,165,250,.7)':'var(--text3)')+'">'+d+'</div>';});
  calH+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';
  cells.forEach((day,i)=>{
    if(!day){calH+='<div></div>';return;}
    const c=i%7;
    const k=y+'-'+String(m+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const ss=sbd[k]||[];const has=ss.length>0;const isT=k===tk;const isSel=k===S.hSel;
    const hasA=ss.some(s=>RM[s.routineId]?.day==='A');const hasB=ss.some(s=>RM[s.routineId]?.day==='B');
    const tc=isT?'#fff':c===0?'#fb7185':c===6?'#60a5fa':has?'var(--text)':'var(--text3)';
    calH+='<button onclick="S.hSel=S.hSel===\''+k+'\'?null:\''+k+'\';vHistory()" style="position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;min-height:44px;border:none;border-radius:8px;background:'+(isSel?'var(--bg3)':'none')+';cursor:pointer">'
      +'<span style="font-size:14px;font-weight:500;font-family:var(--mono);color:'+tc+';line-height:1">'+day+'</span>'
      +(isT?'<div style="position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--lime)"></div>':'')
      +(has?'<div style="display:flex;gap:2px;margin-top:3px">'+(hasA?'<div style="width:6px;height:6px;border-radius:50%;background:var(--lime)"></div>':'')+(hasB?'<div style="width:6px;height:6px;border-radius:50%;background:var(--amber)"></div>':'')+'</div>':'')
      +'</button>';
  });
  calH+='</div>';
  const pre=y+'-'+String(m+1).padStart(2,'0');
  const mEnt=Object.entries(sbd).filter(([k])=>k.startsWith(pre));
  const mDays=mEnt.length,mSess=mEnt.reduce((a,[,v])=>a+v.length,0);
  function sbtn(s){const r=RM[s.routineId];const isA=r.day==='A';const c=isA?'var(--lime)':'var(--amber)';const bg=isA?'var(--lime-dim)':'var(--amber-dim)';const ts=Object.values(s.results||{}).reduce((a,sets)=>a+sets.filter(x=>x.done).length,0);const sc=Object.keys(s.swaps||{}).length;return '<button onclick="go(\'sessionDetail\',{sessionId:\''+s.id+'\'})" style="width:100%;display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;text-align:left"><div style="width:32px;height:32px;border-radius:8px;background:'+bg+';color:'+c+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:var(--mono)">'+r.day+'</div><div style="flex:1"><div style="font-size:14px;font-weight:500;color:var(--text)">'+esc(r.part)+(sc>0?'<span class="badge badge-swap" style="margin-left:6px">대체 '+sc+'</span>':'')+'</div><div style="font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)">'+ts+'세트'+(s.durationSec?' · '+ft(s.durationSec):'')+'</div></div><span style="color:var(--text3)">›</span></button>';}
  let listH='';
  if(S.hSel){const ds=sbd[S.hSel]||[];listH='<div style="margin-top:20px"><div style="font-size:10px;letter-spacing:.3em;color:var(--text3);margin-bottom:12px;font-family:var(--mono)">'+S.hSel.replace(/-/g,'.')+' 기록</div>'+(ds.length?ds.map(sbtn).join(''):'<div style="text-align:center;padding:32px;color:var(--text3)">운동 기록이 없어요</div>')+'</div>';}
  else{const sorted=mEnt.sort(([a],[b])=>b.localeCompare(a));listH='<div style="margin-top:20px"><div style="font-size:10px;letter-spacing:.3em;color:var(--text3);margin-bottom:12px">이달의 모든 기록</div>'+(sorted.length?sorted.map(([dk,ss])=>'<div style="margin-bottom:16px"><div style="font-size:11px;color:var(--text3);margin-bottom:6px;padding:0 4px;font-family:var(--mono)">'+dk.replace(/-/g,'.')+' ('+DAY[new Date(dk).getDay()]+')</div>'+ss.map(sbtn).join('')+'</div>').join(''):'<div style="text-align:center;padding:32px;color:var(--text3)">이달 기록이 없어요</div>')+'</div>';}

  document.getElementById('app').innerHTML='<div style="padding:max(48px,env(safe-area-inset-top)) 20px 48px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px"><button onclick="go(\'home\')" style="background:none;border:none;color:var(--text2);font-size:22px;padding:4px">‹</button><div style="font-size:10px;letter-spacing:.3em;color:var(--text3)">기록</div><div style="width:32px"></div></div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
    +'<button onclick="S.hM===0?(S.hY--,S.hM=11):S.hM--;S.hSel=null;vHistory()" style="background:none;border:none;color:var(--text2);font-size:22px;padding:8px">‹</button>'
    +'<div style="font-weight:700;font-size:16px;font-family:var(--mono)">'+y+'년 '+(m+1)+'월</div>'
    +'<button onclick="S.hM===11?(S.hY++,S.hM=0):S.hM++;S.hSel=null;vHistory()" style="background:none;border:none;color:var(--text2);font-size:22px;padding:8px">›</button>'
    +'</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:16px">'
    +'<div style="flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 16px"><div style="font-size:10px;letter-spacing:.2em;color:var(--text3)">운동한 날</div><div style="display:flex;align-items:baseline;gap:4px;margin-top:2px"><span style="font-size:22px;font-weight:700;color:var(--lime);font-family:var(--mono)">'+mDays+'</span><span style="font-size:12px;color:var(--text3)">일</span></div></div>'
    +'<div style="flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 16px"><div style="font-size:10px;letter-spacing:.2em;color:var(--text3)">총 세션</div><div style="display:flex;align-items:baseline;gap:4px;margin-top:2px"><span style="font-size:22px;font-weight:700;font-family:var(--mono)">'+mSess+'</span><span style="font-size:12px;color:var(--text3)">회</span></div></div>'
    +'</div>'
    +'<div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px">'+calH+'</div>'
    +'<div style="display:flex;gap:16px;margin-bottom:4px;padding:0 4px">'
    +'<div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:var(--lime)"></div><span style="font-size:10px;color:var(--text3)">A 루틴</span></div>'
    +'<div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:var(--amber)"></div><span style="font-size:10px;color:var(--text3)">B 루틴</span></div>'
    +'</div>'
    +listH+'</div>';
}

// ═══════════════════════════════════
// VIEW: SESSION DETAIL
// ═══════════════════════════════════
function vDetail(){
  const sess=S.data.sessions.find(s=>s.id===S.sessionId);
  if(!sess){go('history');return;}
  const r=RM[sess.routineId];const isA=r.day==='A';const ac=isA?'var(--lime)':'var(--amber)';
  const exs=S.data.exercises[sess.routineId]||[];
  let vol=0; Object.values(sess.results||{}).forEach(sets=>sets.forEach(s=>{if(s.done)vol+=(s.weight||0)*(s.reps||0);}));
  const exList=Object.entries(sess.results||{}).map(([eid,sets])=>{
    const ex=exs.find(e=>e.id===eid);if(!ex)return '';
    const sw=sess.swaps?.[eid];const done=sets.filter(s=>s.done);
    return '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:8px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">'
      +'<span style="font-size:14px;font-weight:600">'+esc(sw?sw.name:ex.name)+'</span>'
      +(sw?'<span class="badge badge-swap">대체</span><span style="font-size:10px;color:var(--text3)">← '+esc(ex.name)+'</span>':'')
      +'</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:6px;font-family:var(--mono);font-size:12px">'
      +done.map(s=>'<span style="padding:3px 8px;border-radius:4px;background:var(--bg3);color:var(--text2)">'+(ex.bw?s.reps+'회':s.weight+'×'+s.reps)+'</span>').join('')
      +'</div></div>';
  }).join('');

  document.getElementById('app').innerHTML='<div style="padding:max(48px,env(safe-area-inset-top)) 20px 48px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">'
    +'<button onclick="go(\'history\')" style="background:none;border:none;color:var(--text2);font-size:22px;padding:4px">‹</button>'
    +'<button onclick="if(confirm(\'이 기록을 삭제할까요?\')){S.data={...S.data,sessions:S.data.sessions.filter(s=>s.id!==\''+sess.id+'\')};save(S.data);go(\'history\');}" style="background:none;border:none;color:var(--rose);font-size:18px;padding:4px">🗑</button>'
    +'</div>'
    +'<div style="margin-bottom:32px"><div style="display:flex;align-items:baseline;gap:12px;margin-bottom:4px"><span style="font-size:32px;font-weight:700;color:'+ac+';font-family:var(--mono)">'+r.day+'</span><span style="font-size:20px;font-weight:700">'+esc(r.part)+'</span></div><div style="font-size:12px;color:var(--text3);font-family:var(--mono)">'+fdf(sess.date)+'</div></div>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:32px">'
    +'<div style="border:1px solid var(--border);border-radius:12px;padding:12px"><div style="font-size:9px;letter-spacing:.2em;color:var(--text3);margin-bottom:4px">총 볼륨</div><div style="font-size:16px;font-weight:700;font-family:var(--mono)">'+Math.round(vol).toLocaleString()+'<span style="font-size:10px;color:var(--text3);margin-left:2px">kg</span></div></div>'
    +'<div style="border:1px solid var(--border);border-radius:12px;padding:12px"><div style="font-size:9px;letter-spacing:.2em;color:var(--text3);margin-bottom:4px">완료</div><div style="font-size:16px;font-weight:700;font-family:var(--mono)">'+Object.keys(sess.results||{}).length+'<span style="font-size:10px;color:var(--text3);margin-left:2px">개</span></div></div>'
    +'<div style="border:1px solid var(--border);border-radius:12px;padding:12px"><div style="font-size:9px;letter-spacing:.2em;color:var(--text3);margin-bottom:4px">시간</div><div style="font-size:16px;font-weight:700;font-family:var(--mono)">'+(sess.durationSec?ft(sess.durationSec):'-')+'</div></div>'
    +'</div>'
    +exList+'</div>';
}

// ═══════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════
function render(){
  switch(S.view){
    case 'home':vHome();break;
    case 'workout':vWorkout();startTmr();break;
    case 'history':vHistory();break;
    case 'sessionDetail':vDetail();break;
  }
}

render();
</script>
</body>
</html>
